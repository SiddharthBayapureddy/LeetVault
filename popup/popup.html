<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">

    <header class="header">
      <div class="header__brand">
        <h1 class="header__title" id="title-easter-egg">LeetVault</h1>
      </div>
      <div class="header__controls">
        <button id="manual-save-btn" class="btn btn-primary" disabled>Save Now</button>
      </div>
    </header>

    <div class="section-title">Save Folder</div>
    <section class="section" id="folder-section">
      <!-- State: no folder chosen -->
      <div id="folder-empty" class="folder-state">
        <span class="text-muted">No folder selected</span>
        <button id="pick-folder-btn" class="btn btn-secondary">Choose Directory</button>
      </div>

      <!-- State: folder active -->
      <div id="folder-active" class="folder-state" hidden>
        <div class="folder-path mono" id="folder-path" title=""></div>
        <div class="folder-actions">
          <button id="change-folder-btn" class="btn btn-secondary">Change</button>
        </div>
      </div>

      <!-- State: needs reconnect -->
      <div id="folder-reconnect" class="folder-state" hidden>
        <span class="text-error">Directory access expired</span>
        <button id="reconnect-btn" class="btn btn-error">Reconnect</button>
      </div>
    </section>

    <div class="section-title">Configuration</div>
    <section class="section">
      <div class="field">
        <label for="org-mode" class="field__label">Organization</label>
        <select id="org-mode" class="select">
          <option value="flat">Flat Structure</option>
          <option value="difficulty">By Difficulty</option>
          <option value="category">By Category</option>
          <option value="hybrid">Hybrid Mode</option>
        </select>
      </div>

      <div class="field field--row">
        <label for="toggle-status" class="field__label">Include Status Tag</label>
        <label class="switch">
          <input type="checkbox" id="toggle-status" />
          <span class="switch__slider"></span>
        </label>
      </div>

      <div class="field field--row">
        <label for="toggle-desc" class="field__label">Comment Header</label>
        <label class="switch">
          <input type="checkbox" id="toggle-desc" />
          <span class="switch__slider"></span>
        </label>
      </div>
    </section>

    <div class="section-title">Ledger Stats <span id="inline-log" class="inline-log"></span></div>
    <section class="section" id="stats-section">
      <div class="stats-grid">
        <div class="stat">
          <span class="stat__label">Total</span>
          <span class="stat__value mono" id="stat-total">0</span>
        </div>
        <div class="stat">
          <span class="stat__label">Easy</span>
          <span class="stat__value mono text-easy" id="stat-easy">0</span>
        </div>
        <div class="stat">
          <span class="stat__label">Medium</span>
          <span class="stat__value mono text-medium" id="stat-medium">0</span>
        </div>
        <div class="stat" id="stat-hard-container">
          <span class="stat__label">Hard</span>
          <span class="stat__value mono text-hard" id="stat-hard">0</span>
        </div>
      </div>

      <div class="streak-row" title="Go touch grass.">
        <span class="streak-text mono" id="streak-value">0 Day Streak</span>
      </div>
    </section>

    <section class="command-bar">
      <button id="export-btn" class="cmd-btn">Export</button>
      <button id="import-btn" class="cmd-btn">Import</button>
      <button id="stats-btn" class="cmd-btn">Download Stats</button>
    </section>

    <footer class="status-bar">
      <div class="status-bar__item status-bar__item--clickable" id="power-toggle" aria-pressed="true" tabindex="0">
        Auto-Save: <span id="power-toggle-state" class="mono" style="margin-left: 4px;">ON</span>
      </div>
      <div class="status-bar__item mono" id="folder-status-bar">
        Not Connected
      </div>
    </footer>

    <input type="file" id="import-file" accept=".json" hidden />
    <div id="snackbar" class="snackbar" aria-live="polite"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
